name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint, typecheck, testes e build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -b

      - name: Testes + cobertura (gate 80% na lógica crítica)
        run: npm run test:coverage

      - name: Build do frontend
        run: npm run build
